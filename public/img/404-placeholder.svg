<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <!-- Designed to read correctly under the SVG duotone filter (luminance mapped
       to a dark-teal palette). A small rowboat silhouette adrift on rolling
       waves under a storm sky, a single lantern at the bow. Replace this file
       with the AI-generated 404 photo and the same filter will tint it. -->
  <rect width="1200" height="800" fill="#1a1a1a"/>
  <!-- horizon line, low -->
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#3a3a3a" stroke-width="2"/>
  <!-- distant rolling waves -->
  <path d="M0 540 Q 75 530 150 540 T 300 540 T 450 540 T 600 540 T 750 540 T 900 540 T 1050 540 T 1200 540" stroke="#525252" stroke-width="1.5" fill="none"/>
  <path d="M0 590 Q 75 578 150 590 T 300 590 T 450 590 T 600 590 T 750 590 T 900 590 T 1050 590 T 1200 590" stroke="#404040" stroke-width="1.25" fill="none" opacity="0.6"/>
  <path d="M0 650 Q 75 638 150 650 T 300 650 T 450 650 T 600 650 T 750 650 T 900 650 T 1050 650 T 1200 650" stroke="#383838" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- rowboat silhouette, centered, low in frame -->
  <g transform="translate(560, 600)">
    <path d="M0 0 Q 40 24 80 0 L 72 -2 Q 40 18 8 -2 Z" fill="#666666"/>
    <line x1="40" y1="-2" x2="40" y2="-30" stroke="#666666" stroke-width="2"/>
    <!-- lantern at bow (right end), brighter -->
    <circle cx="74" cy="-26" r="2.5" fill="#9a9a9a"/>
    <circle cx="74" cy="-26" r="8" fill="#9a9a9a" opacity="0.25"/>
  </g>
</svg>
