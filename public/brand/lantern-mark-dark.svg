  <!--
    Stormlantern lantern mark — square symbol, dark-mode variant.

    Same as lantern-mark.svg with the inset inverted (white → dark)
    and the lantern flipped to white. Teal outer panel preserved.

    Use anywhere the symbol-only mark is needed in dark contexts:
    favicon for dark-themed sites, dark-mode app icons, social-media
    avatars on dark profiles.
  -->

