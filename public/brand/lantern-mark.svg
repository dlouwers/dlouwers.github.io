  <!--
    Stormlantern lantern mark — square symbol-only.

    The left half of the canonical lockup, sized as a square for use
    as a favicon, app icon, or social-media avatar.

    Same construction as lockup.svg: teal outer panel · white inset
    box · teal lantern silhouette inside.

    Hex values hardcoded for portability — see lockup.svg for the
    rationale.
  -->

  <!-- Outer teal panel (so the artifact has the brand teal context
       even when shown standalone) -->
